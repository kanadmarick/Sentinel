apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-api
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status-api
  template:
    metadata:
      labels:
        app: status-api
    spec:
      containers:
      - name: status-api
        image: localhost/docker_status-api:latest
        imagePullPolicy: Never
        command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
        env:
        - name: SENTINEL_ZMQ_ADDR
          value: tcp://watchdog:5555
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: status-api
  namespace: sentinel
spec:
  type: NodePort
  selector:
    app: status-api
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30082
