apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brain
  template:
    metadata:
      labels:
        app: brain
    spec:
      containers:
      - name: brain
        image: localhost/docker_brain:latest
        imagePullPolicy: Never
        command:
        - sh
        - -c
        - export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}" && python manage.py migrate && python manage.py runserver 0.0.0.0:8000
        env:
        - name: LEGION_IP
          value: 127.0.0.1
        - name: REDIS_HOST
          value: redis
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: sentinel-db-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sentinel-db-secret
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: sentinel-db-secret
              key: DB_NAME
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: brain
  namespace: sentinel
spec:
  type: NodePort
  selector:
    app: brain
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080
