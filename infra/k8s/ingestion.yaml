apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
      - name: ingestion
        image: localhost/docker_ingestion:latest
        imagePullPolicy: Never
        command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
        env:
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: "6379"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: sentinel
spec:
  type: NodePort
  selector:
    app: ingestion
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30081
