# Docker Compose configuration for Sentinel Core stack
# Paths are relative to infra/docker/ — project root is ../../
services:
  db:
    image: docker.io/library/postgres:15-alpine
    container_name: sentinel_db
    env_file: ../../.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: sentinel_prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ../../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:Z

  watchdog:
    build:
      context: ../../apps/watchdog
      dockerfile: Dockerfile
    container_name: sentinel_watchdog
    working_dir: /app
    command: python watchdog.py
    environment:
      - SENTINEL_ZMQ=tcp://0.0.0.0:5555
      - SENTINEL_NODE_NAME=${SENTINEL_NODE_NAME:-Legion-5}

  status-api:
    build:
      context: ../../apps/status-api
      dockerfile: Dockerfile
    container_name: sentinel_status_api
    working_dir: /app
    ports:
      - "${STATUS_API_HOST_PORT:-8002}:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      - SENTINEL_ZMQ_ADDR=tcp://watchdog:5555
    depends_on:
      watchdog:
        condition: service_started

  brain:
    build:
      context: ../../apps/core-engine
      dockerfile: Dockerfile
    container_name: sentinel_brain
    networks:
      - default
      - sentinel_mesh
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    working_dir: /app
    ports:
      - "${BRAIN_HOST_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - LEGION_IP=${LEGION_IP}
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  default:
  sentinel_mesh:
    name: sentinel_mesh
    driver: bridge
