# Docker Compose configuration for Sentinel application
# This configuration sets up three services: a PostgreSQL database, a Redis cache, and the core application (brain).
services:
# The database service uses the official PostgreSQL image, with environment variables for user, password, and database name. It also includes a health check to ensure the database is ready before the application starts.
  db:
    image: postgres:15-alpine
    container_name: sentinel_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
# The database data is stored in a named volume to persist data across container restarts. Resource limits are set to ensure the database does not consume too much memory, which is important for running on an 8GB Mac.      
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
# Limit memory usage to 256MB to ensure it runs smoothly 
      resources:
        limits:
          memory: 256M 
# The health check uses the pg_isready command to check if the database is ready to accept connections. It runs every 10 seconds, with a timeout of 5 seconds, and will retry up to 5 times before marking the service as unhealthy.          
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
# The Redis service uses the official Redis image, with a memory limit of 128MB to ensure it runs efficiently on an 8GB Mac.
  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    deploy:
      resources:
        limits:
          memory: 128M
# The brain service is built from the Dockerfile located in the ./apps/core-engine directory. It mounts the application code as a volume for easy development and maps port 8000 to allow access to the application. Environment variables are set for the database connection and Legion IP, and it depends on the database service being healthy before it starts.
  brain:
    build: 
      context: ./apps/core-engine
      dockerfile: Dockerfile
    container_name: sentinel_brain
# The command runs database migrations before starting the Django development server, ensuring that the database schema is up to date when the application starts. This setup allows for a smooth development experience while ensuring that the application can connect to the database and run properly.
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
# The application code is mounted as a volume, allowing for live code changes without needing to rebuild the container. This setup is ideal for development, as it provides immediate feedback on code changes while ensuring that the application can connect to the database and run effectively.    
    volumes:
      - ./apps/core-engine:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - LEGION_IP=${LEGION_IP}
# The brain service depends on the database service being healthy before it starts, ensuring that the application can connect to the database when it launches.      
    depends_on:
      db:
        condition: service_healthy
# The volumes section defines a named volume for the PostgreSQL data, allowing it to persist across container restarts and ensuring that the database data is not lost when the container is removed.
volumes:
  postgres_data: